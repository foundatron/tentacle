# Tentacle configuration
# Copy to ~/.config/tentacle/config.toml

# API keys (prefer env vars: ANTHROPIC_API_KEY)
# anthropic_api_key = "sk-ant-..."

# Target repo for issue creation
target_repo = "foundatron/octopusgarden"
issue_label = "tentacle"

# Scan settings
scan_interval = "daily"
backlog_interval = "weekly"
max_issues_per_cycle = 3
# Seconds to wait between issue creations to avoid GitHub rate limits. Set to 0 to disable.
issue_creation_delay = 60
min_maturity_for_issue = 3
relevance_threshold = 0.3
# Maximum LLM cost (USD) for a single scan run. 0.0 means no limit.
scan_budget = 2.0
monthly_budget = 10.0

# LLM models
filter_model = "claude-haiku-4-5"
analyze_model = "claude-sonnet-4-6"

# Database
db_path = "~/.local/share/tentacle/tentacle.db"

# Decay settings
decay_grace_days = 30
decay_interval_days = 60

[sources.arxiv]
enabled = true
queries = [
    "LLM code generation iterative refinement",
    "LLM as judge code evaluation",
    "automated program repair large language model",
    "self-improving code generation feedback loop",
    "cost optimization LLM inference",
    "automated software testing generation LLM",
    "agentic software engineering SWE-bench",
    "program synthesis neural",
    "LLM automated debugging fault localization",
    "multi-agent code generation",
    "prompt optimization code generation",
]
max_results = 50

[sources.semantic_scholar]
enabled = true
queries = [
    "LLM iterative code generation feedback",
    "LLM as judge software evaluation",
    "automated program repair language model",
    "autonomous software engineering agent",
    "agentic coding SWE-bench",
    "neural program synthesis verification",
    "LLM multi-agent software development",
    "prompt optimization meta-prompting",
]
max_results = 50

[sources.hackernews]
enabled = true
queries = [
    "autonomous coding agent",
    "LLM code generation",
    "AI code review",
    "vibe coding",
    "Claude code",
    "agentic coding",
